<!DOCTYPE html>
<html lang="zh-TW">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📚 複製文圖書館</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<div id="copyModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalTitle" style="font-weight: bold; margin-bottom: 10px; color: #3498db;"></div>
        <div id="modalTags" class="card-tags" style="margin-bottom: 15px;"></div>
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-footer">
            <button id="modalCopyBtn" class="copy-btn">複製內容</button>
        </div>
    </div>
</div>
<div id="tagPicker" class="tag-picker">
    <div class="tag-picker-content">
        <div class="tag-picker-header">
            <span>選擇分類標籤</span>
            <span class="close-tag-btn" onclick="hideTagFilter()">&times;</span>
        </div>
        <div id="tagCloud" class="tag-cloud"></div>
    </div>
</div>
<body>

    <h1 class="main-title">
    📚 複製文圖書館 
    <span class="sub-count">
     <span id="countType">當前</span>
     <span id="pastaCount">--</span> 則
    </span>
    <button id="themeToggle" class="icon-btn" onclick="toggleTheme()">🌙</button>
    </h1>
    
    <div class="search-container">
         <div class="site-notice">最後更新時間2026/5/3 18:31 新增40則</div>
    <input type="text" id="searchInput" placeholder="搜尋標題、內容或標籤..." onkeyup="searchCopypasta()">
    <div class="action-buttons">
        <button class="action-btn" onclick="getRandomPasta()">🎲 隨機抽一則</button>
        <button class="action-btn" onclick="showTagFilter()">🏷️ 標籤篩選</button>
    </div>
</div>

<div class="library-grid" id="libraryGrid"></div>

    <script src="script.js" ></script>
</body>
</html>
